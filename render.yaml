# Optional: Render Blueprint — create a Python Web Service from this file.
# https://render.com/docs/infrastructure-as-code
services:
  - type: web
    name: ayurguard-api
    runtime: python
    rootDir: backend
    # Free (512 MB) often OOMs with PyTorch + MiniLM. If the browser shows 502 + CORS errors,
    # upgrade this service to Starter (or higher) in the Render dashboard.
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
